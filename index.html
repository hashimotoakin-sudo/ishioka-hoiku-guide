<title>石岡市 保育所入所ガイド｜令和8年度</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Zen Maru Gothic',sans-serif;background:#FFFAF3;overflow-x:hidden}
  #root{min-height:100vh;min-height:100dvh}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes floatY2{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-9px) rotate(4deg)}}
  @keyframes floatY3{0%,100%{transform:translateY(0) rotate(4deg)}50%{transform:translateY(-5px) rotate(-3deg)}}
  @keyframes floatY4{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.05)}}
  @keyframes wiggle{0%,100%{transform:rotate(-6deg) scale(1)}50%{transform:rotate(6deg) scale(1.08)}}
  @keyframes typing{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
  @keyframes sparkle{0%,100%{opacity:0.4;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
  .fade-up{animation:fadeUp .5s ease both}
  .pop{animation:pop .35s cubic-bezier(.34,1.56,.64,1) both}
  .do-float{animation:floatY 3s ease-in-out infinite}
  .do-float2{animation:floatY2 4s ease-in-out infinite}
  .do-float3{animation:floatY3 3.5s ease-in-out infinite}
  .do-float4{animation:floatY4 2.8s ease-in-out infinite}
  .do-wiggle{animation:wiggle 2.5s ease-in-out infinite}
  .do-sparkle{animation:sparkle 2s ease-in-out infinite}
  .s1{animation-delay:.05s}.s2{animation-delay:.1s}.s3{animation-delay:.15s}
  .s4{animation-delay:.2s}.s5{animation-delay:.25s}.s6{animation-delay:.3s}
  .d1{animation-delay:0s}.d2{animation-delay:.6s}.d3{animation-delay:1.1s}
  .d4{animation-delay:1.6s}.d5{animation-delay:.4s}.d6{animation-delay:.9s}
  .pbtn{transition:transform .18s,box-shadow .18s;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .pbtn:active{transform:scale(.96)!important}
  @media(hover:hover){.pbtn:hover{transform:translateY(-3px)}}
  button{font-family:inherit}
  .typing-dot{animation:typing 1.2s infinite;display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 2px}
  .typing-dot:nth-child(2){animation-delay:.2s}
  .typing-dot:nth-child(3){animation-delay:.4s}
</style>
</head>

/* ─── Global Styles ─── */
const GlobalStyles = () => (
  <style>{`
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

/* ─── Header ─── */
const PageHeader = ({ title, onBack, icon: Icon }) => (
  <div style={{display:"flex",alignItems:"center",gap:12,padding:16,position:"sticky",top:0,zIndex:30,background:"linear-gradient(135deg,#FFF3E6,#FFFAF3)",borderBottom:"1px solid #F0E6D9"}}>
    <button onClick={onBack} style={{width:40,height:40,borderRadius:"50%",border:"none",cursor:"pointer",background:"#fff",boxShadow:"0 2px 8px rgba(180,150,110,0.12)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <I.ArrowLeft size={20} color={C.text} />
    </button>
    {Icon && <Icon size={22} color={C.orange} />}
    <h2 style={{fontSize:18,fontWeight:700,color:C.text,flex:1}}>{title}</h2>
    <div className="do-float" style={{opacity:0.7}}><Mascot size={30} /></div>
  </div>
);

/* ─── Card ─── */
const Card = ({ children, style, className }) => (
  <div className={className || ""} style={{background:C.white,border:"1px solid "+C.border,boxShadow:"0 2px 8px "+C.shadow,borderRadius:16,padding:20,...style}}>
    {children}

);

const findFaqAnswer = (input) => {
  const q = input.toLowerCase().replace(/[？?！!。、\s]/g, "");
  if (q.length === 0) return null;
  let bestMatch = null;
  let bestScore = 0;
  faqData.forEach(faq => {
    let score = 0;
    faq.keywords.forEach(kw => { if (q.includes(kw)) score += kw.length; });
    if (score > bestScore) { bestScore = score; bestMatch = faq; }
  });
  return bestScore >= 2 ? bestMatch : null;
};

};

/* ━━━ DIAGNOSIS ━━━ */
const DiagnosisPage = ({ onBack }) => {
  const questions = [
    { id:"resident", text:"石岡市に住民票がありますか？" },
    { id:"age", text:"お子さまは就学前（小学校入学前）ですか？" },
    { id:"work", text:"保護者は就労していますか？（月60時間以上）" },
    { id:"both", text:"保護者全員に保育が必要な理由がありますか？（共働き・ひとり親等）" },
    { id:"hours", text:"就労時間は月120時間以上ですか？" },
  ];
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [showResult, setShowResult] = useState(false);

  const handleAnswer = (val) => {
    const q = questions[step];
    const next = {...answers, [q.id]: val};
    setAnswers(next);
    if ((q.id==="resident"&&!val)||(q.id==="age"&&!val)||(q.id==="both"&&!val)) { setShowResult(true); return; }
    if (step < questions.length - 1) setStep(step + 1);
    else setShowResult(true);
  };
  const reset = () => { setStep(0); setAnswers({}); setShowResult(false); };
  const getResult = () => {
    if (!answers.resident) return { ok:false, msg:"石岡市に住民票がある方が対象です。転入予定の場合は、こども未来課へご相談ください。" };
    if (!answers.age) return { ok:false, msg:"保育所は就学前のお子さまが対象です。" };
    if (!answers.both) return { ok:false, msg:"保護者全員に保育の必要性が認められる必要があります。求職中（最大90日）の場合も申請可能です。こども未来課へご相談ください。" };
    return { ok:true, category:answers.hours?"保育標準時間（最大11時間）":"保育短時間（最大8時間）", docs:answers.work?["就労証明書（勤務先に記入依頼）"]:["保育の必要性を証明する書類（求職活動申立書・診断書等）"] };
  };

  if (showResult) {
    const r = getResult();
    return (
      <div style={{background:C.cream,minHeight:"100vh"}}>
        <GlobalStyles />
        <PageHeader title="診断結果" onBack={onBack} icon={I.UserCheck} />
        <DecoBar items={[<Toy.Star size={20} color="#F28C38"/>,<Toy.Heart size={20} color="#D45D8E"/>,<Toy.Rainbow size={28}/>,<Toy.Flower size={20} color="#5DAA68"/>,<Toy.Star size={20} color="#5B8AD0"/>]} />
        <div style={{padding:"24px 16px",maxWidth:420,margin:"0 auto"}}>
          <div className="pop" style={{borderRadius:24,padding:24,textAlign:"center",background:C.white,border:"2px solid "+(r.ok?C.green:C.orange),boxShadow:"0 6px 24px "+C.shadow}}>
            <div style={{position:"relative",display:"inline-block",marginBottom:12}}>
              <div className={"do-float"+(r.ok?" do-wiggle":"")} style={{display:"inline-block"}}><Mascot size={64} /></div>
              {r.ok && (
                <>
                  <div className="do-float2 d1" style={{position:"absolute",top:-10,left:-30,opacity:0.7}}><Toy.Star size={22} color="#F28C38"/></div>
                  <div className="do-float d3" style={{position:"absolute",top:-8,right:-28,opacity:0.7}}><Toy.Heart size={20} color="#D45D8E"/></div>
                  <div className="do-float3 d2" style={{position:"absolute",bottom:-8,left:-26,opacity:0.65}}><Toy.Flower size={20} color="#5DAA68"/></div>
                  <div className="do-float2 d4" style={{position:"absolute",bottom:-6,right:-24,opacity:0.65}}><Toy.Rainbow size={28}/></div>
                </>
              )}
            </div>
            {r.ok ? (
              <div>
                <p style={{fontSize:18,fontWeight:900,color:C.green}}>申請できる可能性が高いです！</p>
                <div style={{borderRadius:16,padding:16,background:C.greenLight,marginTop:16,textAlign:"left"}}><p style={{fontSize:14,fontWeight:700,color:C.greenDark}}>認定区分（目安）</p><p style={{fontSize:16,fontWeight:700,color:C.text,marginTop:4}}>{r.category}</p></div>
                <div style={{borderRadius:16,padding:16,background:C.orangeLight,marginTop:12,textAlign:"left"}}><p style={{fontSize:14,fontWeight:700,color:C.orange}}>必要な証明書類</p>{r.docs.map(d => <p key={d} style={{fontSize:14,color:C.text,marginTop:4}}>・{d}</p>)}</div>
                <p style={{fontSize:12,color:C.textLight,marginTop:16}}>※この診断は目安です。正式な認定は市の審査により決定されます。</p>
              </div>
            ) : (
              <div>
                <p style={{fontSize:18,fontWeight:900,color:C.orange}}>ご確認ください</p>
                <p style={{fontSize:14,color:C.textMid,marginTop:12}}>{r.msg}</p>
              </div>
            )}
            <button onClick={reset} className="pbtn" style={{marginTop:20,padding:"12px 24px",borderRadius:16,fontSize:14,fontWeight:700,color:"#fff",fontFamily:"inherit",background:C.orange,border:"none",cursor:"pointer",boxShadow:"0 4px 12px rgba(242,140,56,0.3)"}}>もう一度診断する</button>
          </div>
        </div>
      </div>
    );
  }

  const progress = (step / questions.length) * 100;
  const toyIcons = [<Toy.Block size={22}/>,<Toy.Crayon size={22} color="#D45D8E"/>,<Toy.Duck size={22}/>,<Toy.Ball size={22}/>,<Toy.Star size={22} color="#5DAA68"/>];
  return (
    <div style={{background:C.cream,minHeight:"100vh"}}>
      <GlobalStyles />
      <PageHeader title="入所資格かんたん診断" onBack={onBack} icon={I.UserCheck} />
      <DecoBar items={[<Toy.Block size={20}/>,<Toy.Star size={18} color="#D45D8E"/>,<Toy.Duck size={22}/>,<Toy.Rainbow size={26}/>,<Toy.Flower size={20} color="#F28C38"/>,<Toy.Ball size={20}/>]} />
      <div style={{padding:"24px 16px",maxWidth:420,margin:"0 auto"}}>
        <div className="fade-up" style={{marginBottom:16}}>
          <span style={{fontSize:12,color:C.textMid}}>質問 {step + 1} / {questions.length}</span>
          <div style={{width:"100%",height:8,borderRadius:999,background:C.border,marginTop:4}}><div style={{height:"100%",borderRadius:999,width:progress+"%",background:"linear-gradient(90deg,"+C.orange+","+C.green+")",transition:"width 0.4s"}} /></div>
        </div>
        <div key={step} className="pop" style={{borderRadius:24,padding:24,background:C.white,border:"1.5px solid "+C.border,boxShadow:"0 4px 16px "+C.shadow}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
            <div className={"do-float d"+(step+1)}>{toyIcons[step]}</div>
          </div>
          <p style={{fontSize:18,fontWeight:700,color:C.text,lineHeight:1.6,textAlign:"center"}}>{questions[step].text}</p>
          <div style={{display:"flex",gap:12,marginTop:24}}>
            <button onClick={() => handleAnswer(true)} className="pbtn" style={{flex:1,padding:"16px 0",borderRadius:16,fontSize:16,fontWeight:700,color:"#fff",background:C.green,border:"none",cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 12px rgba(93,170,104,0.3)"}}>はい</button>
            <button onClick={() => handleAnswer(false)} className="pbtn" style={{flex:1,padding:"16px 0",borderRadius:16,fontSize:16,fontWeight:700,color:C.textMid,background:C.white,border:"2px solid "+C.border,cursor:"pointer",fontFamily:"inherit"}}>いいえ</button>
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:20,opacity:0.55}}>
          <div className="do-wiggle" style={{display:"inline-block"}}><Mascot size={36}/></div>
        </div>
      </div>
    </div>
  );

/* ━━━ 認定区分かんたん診断 ━━━ */
const NinteiDiagnosis = () => {
  const [step, setStep] = useState(0);
  const [result, setResult] = useState(null);
  const questions = [
    { q:"お子さまの年齢は？", opts:[{label:"0〜2歳", action:"age02"},{label:"3〜5歳", action:"age35"}]},
  ];
  const q2_care = { q:"保護者に保育が必要な理由がありますか？\n（就労・出産・疾病・介護・求職など）", opts:[{label:"はい", action:"care_yes"},{label:"いいえ", action:"care_no"}]};
  const q3_hours = { q:"就労時間は月120時間以上ですか？", opts:[{label:"はい（120時間以上）", action:"hours_long"},{label:"いいえ（60〜120時間未満）", action:"hours_short"}]};
  const results = {
    "1号": { num:"1号認定", color:"#5B8AD0", bg:"#E8F0FA", border:"#c8d8f0", desc:"教育のみの認定です", facility:"幼稚園・認定こども園", time:"教育標準時間（4時間程度）", fee:"全世帯 無料" },
    "2号標準": { num:"2号認定", color:C.orange, bg:C.orangeLight, border:C.orangeSoft, desc:"保育が必要な3〜5歳児", facility:"保育所・認定こども園", time:"保育標準時間（最大11時間）", fee:"全世帯 無料" },
    "2号短時間": { num:"2号認定", color:C.orange, bg:C.orangeLight, border:C.orangeSoft, desc:"保育が必要な3〜5歳児", facility:"保育所・認定こども園", time:"保育短時間（最大8時間）", fee:"全世帯 無料" },
    "3号標準": { num:"3号認定", color:"#D45D8E", bg:"#FFF0F3", border:"#f0d0d8", desc:"保育が必要な0〜2歳児", facility:"保育所・小規模保育・認定こども園", time:"保育標準時間（最大11時間）", fee:"所得に応じて決定" },
    "3号短時間": { num:"3号認定", color:"#D45D8E", bg:"#FFF0F3", border:"#f0d0d8", desc:"保育が必要な0〜2歳児", facility:"保育所・小規模保育・認定こども園", time:"保育短時間（最大8時間）", fee:"所得に応じて決定" },
  };
  const [age, setAge] = useState(null);
  const currentQ = step === 0 ? questions[0] : step === 1 ? q2_care : step === 2 ? q3_hours : null;
  const handleOpt = (action) => {
    if (step === 0) { setAge(action); setStep(1); }
    else if (step === 1) {
      if (action === "care_no") { if (age === "age35") setResult(results["1号"]); else setStep(99); }
      else setStep(2);
    } else if (step === 2) {
      if (age === "age35") setResult(action === "hours_long" ? results["2号標準"] : results["2号短時間"]);
      else setResult(action === "hours_long" ? results["3号標準"] : results["3号短時間"]);
    }
  };
  const reset = () => { setStep(0); setResult(null); setAge(null); };
  if (step === 99) return (
    <Card className="fade-up">
      <h3 style={{fontSize:15,fontWeight:700,color:C.text,display:"flex",alignItems:"center",gap:8}}><I.UserCheck size={18} color={C.orange} /> 認定区分チェック結果</h3>
      <div className="pop" style={{marginTop:12,borderRadius:12,padding:16,background:C.orangeLight,textAlign:"center"}}>
        <p style={{fontSize:14,fontWeight:700,color:C.orange}}>0〜2歳で保育の必要性がない場合</p>
        <p style={{fontSize:13,color:C.textMid,marginTop:8}}>保育所等の入所には「保育の必要性」が必要です。こども未来課へご相談ください。</p>
      </div>
      <button onClick={reset} className="pbtn" style={{marginTop:12,width:"100%",padding:"10px",borderRadius:12,fontSize:13,fontWeight:700,background:C.white,color:C.orange,border:"1.5px solid "+C.orange,cursor:"pointer",fontFamily:"inherit"}}>もう一度チェックする</button>
    </Card>
  );
  if (result) return (
    <Card className="fade-up">
      <h3 style={{fontSize:15,fontWeight:700,color:C.text,display:"flex",alignItems:"center",gap:8}}><I.UserCheck size={18} color={result.color} /> 認定区分チェック結果</h3>
      <div className="pop" style={{marginTop:12,borderRadius:16,padding:16,background:result.bg,border:"2px solid "+result.border,textAlign:"center"}}>
        <p style={{fontSize:24,fontWeight:900,color:result.color}}>{result.num}</p>
        <p style={{fontSize:13,color:C.textMid,marginTop:4}}>{result.desc}</p>
        <div className="do-float d1" style={{marginTop:8,display:"inline-block",opacity:0.7}}>
          {result.num.includes("3") ? <Toy.Duck size={28}/> : result.num.includes("2") ? <Toy.Block size={28}/> : <Toy.Star size={28} color="#5B8AD0"/>}
        </div>
      </div>
      <div style={{marginTop:12,fontSize:13,color:C.textMid,lineHeight:1.8}}>
        <p><strong style={{color:C.text}}>利用できる施設：</strong>{result.facility}</p>
        <p><strong style={{color:C.text}}>利用時間：</strong>{result.time}</p>
        <p><strong style={{color:C.text}}>保育料：</strong><span style={{fontWeight:700,color:result.fee.includes("無料")?C.green:result.color}}>{result.fee}</span></p>
      </div>
      <p style={{fontSize:11,color:C.textLight,marginTop:8}}>※この診断は目安です。正式な認定は市の審査で決定されます。</p>
      <button onClick={reset} className="pbtn" style={{marginTop:10,width:"100%",padding:"10px",borderRadius:12,fontSize:13,fontWeight:700,background:C.white,color:result.color,border:"1.5px solid "+result.color,cursor:"pointer",fontFamily:"inherit"}}>もう一度チェックする</button>
    </Card>
  );
  return (
    <Card className="fade-up">
      <h3 style={{fontSize:15,fontWeight:700,color:C.text,display:"flex",alignItems:"center",gap:8}}><I.UserCheck size={18} color="#5B8AD0" /> うちの子は何号認定？</h3>
      <p style={{fontSize:12,color:C.textLight,marginTop:4}}>かんたんな質問に答えると認定区分がわかります</p>
      {currentQ && (
        <div key={step} className="pop" style={{marginTop:12}}>
          <p style={{fontSize:15,fontWeight:700,color:C.text,lineHeight:1.6,whiteSpace:"pre-line"}}>{currentQ.q}</p>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            {currentQ.opts.map(opt => (
              <button key={opt.label} onClick={()=>handleOpt(opt.action)} className="pbtn" style={{flex:1,padding:"14px 8px",borderRadius:12,fontSize:14,fontWeight:700,background:C.white,color:C.text,border:"2px solid "+C.border,cursor:"pointer",fontFamily:"inherit"}}>{opt.label}</button>
            ))}
          </div>
          <div style={{marginTop:10,display:"flex",gap:4}}>
            {[0,1,2].map(i=>(<div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?"#5B8AD0":C.border}} />))}
          </div>
        </div>
      )}
    </Card>
  );
};

              <div className={"do-float d"+(i+1)} style={{opacity:0.6}}><Mascot size={28}/></div>
            </div>
            <p style={{fontSize:15,fontWeight:700,color:C.text,marginTop:8}}>{o.name}</p>
            <p style={{fontSize:13,color:C.textMid,marginTop:4,display:"flex",alignItems:"center",gap:4}}><I.MapPin size={14} color={C.textMid} />{o.loc}</p>
            <p style={{fontSize:13,color:C.textMid,marginTop:6,display:"flex",alignItems:"center",gap:4}}><I.Phone size={13} color={C.orange} /><strong style={{color:C.text}}>電話：</strong>{o.tel}</p>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <a href={"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(o.loc+" "+o.name)} target="_blank" rel="noopener noreferrer" className="pbtn" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px 0",borderRadius:12,fontSize:13,fontWeight:700,background:C.orange,color:"#fff",textDecoration:"none",boxShadow:"0 3px 10px rgba(242,140,56,0.3)"}}>
                <I.MapPin size={15} color="#fff" /> Googleマップで見る
              </a>
              <a href={"tel:"+o.tel} className="pbtn" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px 16px",borderRadius:12,fontSize:13,fontWeight:700,background:C.greenLight,color:C.greenDark,textDecoration:"none",border:"1.5px solid "+C.green}}>
                <I.Phone size={15} color={C.greenDark} /> 電話
              </a>
            </div>
          </Card>
        ))}
        <div className="fade-up s3" style={{borderRadius:16,padding:12,background:C.orangeLight,border:"1px solid "+C.orangeSoft,marginBottom:16}}>
          <p style={{fontSize:13,fontWeight:700,color:C.orange}}>受付時間：平日 8:30～17:15</p>
        </div>
        <div className="fade-up s4" style={{marginBottom:8}}>
          <p style={{fontSize:15,fontWeight:700,color:C.text,display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <I.MessageCircle size={18} color={C.orange} /> よくある質問チャット
          </p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
          {messages.map((m, i) => (
            <div key={i} className={i === 0 ? "fade-up" : "pop"} style={{display:"flex",justifyContent:m.from==="user"?"flex-end":"flex-start",gap:8}}>
              {m.from === "bot" && <div style={{width:36,height:36,flexShrink:0,marginTop:4}}><Mascot size={36} /></div>}
              <div style={{maxWidth:"78%",padding:"12px 16px",borderRadius:m.from==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:m.from==="user"?C.orange:C.white,color:m.from==="user"?"#fff":C.text,fontSize:14,lineHeight:1.6,border:m.from==="bot"?"1px solid "+C.border:"none",boxShadow:"0 2px 6px "+C.shadow,whiteSpace:"pre-line"}}>{m.text}</div>
            </div>
          ))}
          {isTyping && (
            <div className="pop" style={{display:"flex",gap:8}}>
              <div style={{width:36,height:36,flexShrink:0,marginTop:4}}><Mascot size={36} /></div>
              <div style={{padding:"12px 20px",borderRadius:"18px 18px 18px 4px",background:C.white,border:"1px solid "+C.border,boxShadow:"0 2px 6px "+C.shadow}}>
                <span className="typing-dot" style={{background:C.orange}} />
                <span className="typing-dot" style={{background:C.orange}} />
                <span className="typing-dot" style={{background:C.orange}} />
              </div>
            </div>
          )}
          <div ref={chatEndRef} />
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
          {suggestedQs.map(sq => (
            <button key={sq} onClick={() => sendMessage(sq)} className="pbtn" style={{padding:"8px 14px",borderRadius:20,fontSize:13,fontWeight:600,background:C.white,color:C.orange,border:"1.5px solid "+C.orangeSoft,cursor:"pointer",fontFamily:"inherit"}}>{sq}</button>
          ))}
        </div>
      </div>
      <div style={{position:"sticky",bottom:0,padding:"8px 16px",paddingBottom:"max(8px, env(safe-area-inset-bottom))",background:C.white,borderTop:"1px solid "+C.border,boxShadow:"0 -2px 10px "+C.shadow}}>
        <div style={{display:"flex",gap:8,maxWidth:420,margin:"0 auto"}}>
          <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") sendMessage(); }} placeholder="質問を入力してください..." style={{flex:1,padding:"12px 16px",borderRadius:24,border:"1.5px solid "+C.border,fontSize:15,fontFamily:"inherit",outline:"none",background:C.cream}} />
          <button onClick={() => sendMessage()} disabled={!input.trim()} className="pbtn" style={{width:46,height:46,borderRadius:"50%",border:"none",cursor:"pointer",background:input.trim()?C.orange:C.border,display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.2s"}}>
            <I.Send size={20} color="#fff" />
          </button>
        </div>
      </div>
    </div>
  );
};

/* ━━━ APP ━━━ */
function App() {
  const [page, setPage] = useState("home");
  const goHome = useCallback(() => setPage("home"), []);
  switch (page) {
    case "flow": return <FlowPage onBack={goHome} />;
    case "docs": return <DocsPage onBack={goHome} />;
    case "facilities": return <FacilitiesPage onBack={goHome} />;
    case "diagnosis": return <DiagnosisPage onBack={goHome} />;
    case "fees": return <FeesPage onBack={goHome} />;
    case "contact": return <ContactPage onBack={goHome} />;
    default: return <HomeScreen navigate={setPage} />;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
